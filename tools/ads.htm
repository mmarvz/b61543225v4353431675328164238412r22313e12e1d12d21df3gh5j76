<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝑀|𝒮ʸˢᵗᵉᵐ 𝒮ᵒˡᵘᵗⁱᵒⁿˢ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .slider {
            position: relative;
            width: 100%;
            height: 100%;
            margin: auto;
            overflow: hidden;
        }

        .slides {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }

        .slide {
            min-width: 100%;
            height: 100%;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .controls {
            position: absolute;
            top: 5%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            transform: translateY(-50%);
        }

        .button {
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }

        .button:hover {
            background-color: rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>
    <div class="slider">
        <div class="slides" id="slides">
            <div class="slide" id="slide1">
                <a href="#" id="link1"><img src="1.gif" alt="Image 1"></a>
            </div>
            <div class="slide" id="slide2">
                <a href="#" id="link2"><img src="2.gif" alt="Image 2"></a>
            </div>
            <div class="slide" id="slide3">
                <a href="#" id="link3"><img src="3.gif" alt="Image 3"></a>
            </div>
            <div class="slide" id="slide4">
                <a href="#" id="link4"><img src="4.gif" alt="Image 4"></a>
            </div>
            <div class="slide" id="slide5">
                <a href="#" id="link5"><img src="5.gif" alt="Image 5"></a>
            </div>
        </div>
        <div class="controls">
            <button class="button" id="prev">◄</button>
            <button class="button" id="next">►</button>
        </div>
    </div>

    <script>
        const slides = document.getElementById('slides');
        const totalSlides = document.querySelectorAll('.slide').length;
        let index = 0;

        function showSlide(newIndex) {
            if (newIndex < 0) {
                index = totalSlides - 1;
            } else if (newIndex >= totalSlides) {
                index = 0;
            } else {
                index = newIndex;
            }
            slides.style.transform = `translateX(-${index * 100}%)`;
        }

        document.getElementById('prev').addEventListener('click', () => {
            showSlide(index - 1);
        });

        document.getElementById('next').addEventListener('click', () => {
            showSlide(index + 1);
        });

        setInterval(() => {
            showSlide(index + 1);
        }, 10000);
    </script>
</body>
</html>
